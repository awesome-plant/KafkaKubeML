executor: LocalExecutor

airflowImage:
  tag: 2.9.1

createUserJob:
  useHelmHooks: false

postgresql:
  enabled: true

redis:
  enabled: true

webserver:
  enabled: true
  service:
    type: NodePort

ingress:
  enabled: true
  api:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - name: localhost
    tls:
      enabled: false
  web:
    enabled: false  # must be disabled in 1.18.0+

dags:
  persistence:
    enabled: true
    existingClaim: airflow-dags-pvc
  
config:
  core:
    dag_dir_list_interval: 30
