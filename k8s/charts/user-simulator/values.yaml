# charts/user-simulator/values.yaml
image:
  repository: awesomeplant/user_simulator
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

kafka:
  brokers: kafka-cluster-kafka-bootstrap.kafka-stream.svc:9092
  topic: user-interactions

generator:
  rate: 100                  # events/sec per pod
  batchSize: 100
  payloadBytes: 300
  keyPrefix: user-
  logLevel: INFO
  metricsPort: 8000
  createTopic: false
  topicPartitions: 12
  topicReplication: 1

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 65
